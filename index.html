<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VectorSnack -- Grab vector pieces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0a0b;
    --bg-secondary: #111113;
    --bg-tertiary: #1a1a1e;
    --bg-hover: #222228;
    --surface: #16161a;
    --border: #2a2a30;
    --border-active: #ff4d00;
    --text-primary: #e8e6e3;
    --text-secondary: #8a8a8e;
    --text-muted: #555558;
    --accent: #ff4d00;
    --accent-glow: rgba(255, 77, 0, 0.3);
    --accent-secondary: #00e5a0;
    --accent-secondary-glow: rgba(0, 229, 160, 0.25);
    --danger: #ff2d55;
    --warning: #ffb800;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-mono: 'Space Mono', 'Courier New', monospace;
    --radius: 4px;
    --transition: 150ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  ::selection {
    background: var(--accent);
    color: var(--bg-primary);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ===== LAYOUT ===== */
  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 280px 1fr;
    height: 100vh;
    gap: 0;
  }

  /* ===== HEADER ===== */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    position: relative;
    z-index: 10;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    position: relative;
    top: 4px;
  }

  .logo h1 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--text-primary);
  }

  .logo h1 em {
    color: var(--accent);
    font-style: italic;
  }

  .logo-tagline {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all var(--transition);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
    background: var(--bg-hover);
  }

  .btn--accent {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255, 77, 0, 0.08);
  }

  .btn--accent:hover {
    background: rgba(255, 77, 0, 0.15);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn--success {
    border-color: var(--accent-secondary);
    color: var(--accent-secondary);
    background: rgba(0, 229, 160, 0.08);
  }

  .btn--success:hover {
    background: rgba(0, 229, 160, 0.15);
    box-shadow: 0 0 20px var(--accent-secondary-glow);
  }

  .btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    transition: background var(--transition);
  }

  .sidebar-section-header:hover {
    background: var(--bg-tertiary);
  }

  .sidebar-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .sidebar-section-count {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 1px 6px;
    border-radius: 2px;
  }

  .layer-tree {
    overflow-y: auto;
    flex: 1;
  }

  .layer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all var(--transition);
    border-left: 2px solid transparent;
    position: relative;
  }

  .layer-item:hover {
    background: var(--bg-tertiary);
  }

  .layer-item.selected {
    background: rgba(255, 77, 0, 0.06);
    border-left-color: var(--accent);
  }

  .layer-item.hovered {
    background: rgba(255, 77, 0, 0.04);
  }

  .layer-item--group {
    font-weight: 700;
  }

  .layer-item--child {
    padding-left: 32px;
  }

  .layer-item--child::before {
    content: '';
    position: absolute;
    left: 24px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }

  .layer-toggle {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: transform var(--transition);
    flex-shrink: 0;
  }

  .layer-toggle.expanded {
    transform: rotate(90deg);
  }

  .layer-toggle svg {
    width: 10px;
    height: 10px;
  }

  .layer-name {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .layer-item.selected .layer-name {
    color: var(--accent);
  }

  .layer-type {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  /* ===== MAIN CANVAS ===== */
  .main {
    background: var(--bg-primary);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .canvas-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .canvas-viewport {
    position: absolute;
    transform-origin: 0 0;
    cursor: grab;
  }

  .canvas-viewport:active {
    cursor: grabbing;
  }

  .canvas-viewport svg {
    display: block;
  }

  /* Grid pattern */
  .canvas-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.08;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  /* ===== DROPZONE ===== */
  .dropzone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
    transition: opacity 0.3s ease;
  }

  .dropzone.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .dropzone-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 60px 80px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    position: relative;
    transition: all 0.3s ease;
  }

  .dropzone.drag-over .dropzone-inner {
    border-color: var(--accent);
    background: rgba(255, 77, 0, 0.03);
    box-shadow: 0 0 60px rgba(255, 77, 0, 0.08);
  }

  .dropzone-icon {
    width: 64px;
    height: 64px;
    color: var(--text-muted);
    transition: all 0.3s ease;
  }

  .dropzone.drag-over .dropzone-icon {
    color: var(--accent);
    transform: scale(1.1);
  }

  .dropzone-title {
    font-family: var(--font-display);
    font-size: 32px;
    color: var(--text-secondary);
    font-style: italic;
  }

  .dropzone-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .dropzone-formats {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .format-badge {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    transition: all var(--transition);
  }

  .dropzone.drag-over .format-badge {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ===== ELEMENT HOVER/SELECT OVERLAYS ===== */
  .svg-element-interactive {
    cursor: pointer;
    transition: filter 0.1s ease;
  }

  .svg-element-interactive:hover {
    filter: drop-shadow(0 0 3px var(--accent));
  }

  .element-highlight-hover {
    outline: 1.5px dashed rgba(255, 77, 0, 0.5);
    outline-offset: 2px;
  }

  .element-highlight-selected {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    filter: drop-shadow(0 0 6px var(--accent-glow));
  }

  /* ===== MARQUEE SELECTION ===== */
  .marquee {
    position: fixed;
    border: 1.5px dashed var(--accent);
    background: rgba(255, 77, 0, 0.06);
    pointer-events: none;
    z-index: 15;
    display: none;
  }

  .marquee.active {
    display: block;
  }

  /* ===== BOTTOM BAR ===== */
  .bottombar {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    z-index: 10;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
  }

  .bottombar .zoom-display {
    font-size: 11px;
    color: var(--text-muted);
    min-width: 40px;
    text-align: center;
  }

  .bottombar .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .file-info {
    font-size: 11px;
    color: var(--text-muted);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ===== TOAST NOTIFICATION ===== */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 10px 20px;
    background: var(--accent-secondary);
    color: var(--bg-primary);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    border-radius: var(--radius);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== SELECTION PANEL (right top) ===== */
  .selection-panel {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 260px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    z-index: 10;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: none;
    overflow: hidden;
  }

  .selection-panel.visible {
    display: block;
    animation: panelIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .selection-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .selection-panel-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .selection-panel-close {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    transition: color var(--transition);
    background: none;
    border: none;
  }

  .selection-panel-close:hover {
    color: var(--text-primary);
  }

  .selection-panel-body {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .selection-preview {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 120px;
  }

  .selection-preview svg {
    max-width: 100%;
    max-height: 180px;
  }

  .selection-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .selection-meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .selection-meta-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  .selection-meta-value {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .selection-actions {
    display: flex;
    gap: 6px;
  }

  .selection-actions .btn {
    flex: 1;
    justify-content: center;
  }

  /* ===== SVG CODE MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.visible {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 90%;
    max-width: 700px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .modal-body {
    padding: 18px;
    overflow-y: auto;
    flex: 1;
  }

  .code-block {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.6;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
  }

  /* ===== LOADING ===== */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 11, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 20;
  }

  .loading-overlay.visible {
    display: flex;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
    }
    .sidebar {
      display: none;
    }
    .header .logo-tagline {
      display: none;
    }
  }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <svg class="logo-mark" viewBox="0 0 32 32" fill="none">
        <rect x="2" y="2" width="28" height="28" rx="4" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M8 22 L16 8 L24 22 Z" stroke="#ff4d00" stroke-width="1.5" fill="none"/>
        <circle cx="16" cy="16" r="3" fill="#ff4d00" opacity="0.6"/>
        <line x1="8" y1="16" x2="24" y2="16" stroke="#ff4d00" stroke-width="0.5" opacity="0.4"/>
      </svg>
      <h1>Vector<em>Snack</em></h1>
      <span class="logo-tagline">Slice & grab vectors</span>
    </div>
    <div class="header-actions">
      <input type="file" id="fileInput" accept=".svg,.ai,.eps,.pdf" multiple style="display:none">
      <button class="btn btn--accent" id="btnLoadFile">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v12M2 8h12"/></svg>
        Load file
      </button>
      <button class="btn" id="btnClearAll" style="display:none">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l8 8M12 4l-8 8"/></svg>
        Clear
      </button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span class="sidebar-section-title">Layers</span>
        <span class="sidebar-section-count" id="layerCount">0</span>
      </div>
    </div>
    <div class="layer-tree" id="layerTree">
      <div style="padding: 20px 16px; text-align: center;">
        <p style="color: var(--text-muted); font-size: 11px; line-height: 1.6;">
          Load a vector file<br>to see layers here
        </p>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainArea">
    <div class="canvas-grid"></div>

    <!-- Dropzone -->
    <div class="dropzone" id="dropzone">
      <div class="dropzone-inner">
        <svg class="dropzone-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="8" y="8" width="48" height="48" rx="6"/>
          <path d="M32 20v24M20 32h24" stroke-width="2"/>
          <path d="M20 44l8-10 6 6 8-12 10 16" opacity="0.4"/>
        </svg>
        <div class="dropzone-title">Drop vectors here</div>
        <div class="dropzone-subtitle">or click Load File above</div>
        <div class="dropzone-formats">
          <span class="format-badge">.svg</span>
          <span class="format-badge">.ai</span>
          <span class="format-badge">.eps</span>
          <span class="format-badge">.pdf</span>
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-container" id="canvasContainer" style="display:none">
      <div class="canvas-viewport" id="canvasViewport"></div>
    </div>

    <!-- Selection Panel -->
    <div class="selection-panel" id="selectionPanel">
      <div class="selection-panel-header">
        <span class="selection-panel-title">Selected element</span>
        <button class="selection-panel-close" id="btnDeselectPanel">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="12" height="12"><path d="M4 4l8 8M12 4l-8 8"/></svg>
        </button>
      </div>
      <div class="selection-panel-body">
        <div class="selection-preview" id="selectionPreview"></div>
        <div class="selection-meta" id="selectionMeta"></div>
        <div class="selection-actions">
          <button class="btn btn--success" id="btnCopySvg">

<!-- pdf.js 2.16.105 UMD build with SVGGraphics support -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>

// ==============================
// PDF.js setup
// ==============================
var pdfjsLib = window.pdfjsLib || null;
if (pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
}

// ==============================
// State
// ==============================
var currentSvgDoc = null;
var selectedElements = []; // multi-select support
var hoveredElement = null;
var zoom = 1;
var panX = 0, panY = 0;
var isPanning = false;
var panStartX, panStartY;
// Marquee state
var isMarquee = false;
var marqueeStartX = 0, marqueeStartY = 0;

// ==============================
// DOM references
// ==============================
var viewport = document.getElementById('canvasViewport');
var container = document.getElementById('canvasContainer');
var dropzone = document.getElementById('dropzone');

var layerCountEl = document.getElementById('layerCount');
var selectionPanel = document.getElementById('selectionPanel');
var toastEl = document.getElementById('toast');
var bottombar = document.getElementById('bottombar');
var loadingOverlay = document.getElementById('loadingOverlay');
var fileInput = document.getElementById('fileInput');
var mainArea = document.getElementById('mainArea');
var codeModal = document.getElementById('codeModal');
var codeContent = document.getElementById('codeContent');
var selectionPreview = document.getElementById('selectionPreview');
var selectionMeta = document.getElementById('selectionMeta');
var marqueeEl = document.getElementById('marquee');

// ==============================
// Event bindings
// ==============================
document.getElementById('btnLoadFile').addEventListener('click', function() { fileInput.click(); });

document.getElementById('btnDeselectPanel').addEventListener('click', deselectAll);

document.getElementById('btnZoomOut').addEventListener('click', zoomOut);

fileInput.addEventListener('change', function(e) {

});

// Drag & drop
mainArea.addEventListener('dragover', function(e) {

});
mainArea.addEventListener('dragleave', function(e) {

document.addEventListener('keydown', function(e) {

});

window.addEventListener('resize', function() {

});

// ==============================
// File handling
// ==============================
async function handleFile(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  showLoading(true);
  try {
    var svgText;
    if (ext === 'svg') {
      svgText = await file.text();
    } else if (ext === 'ai' || ext === 'pdf') {
      svgText = await convertPdfToSvg(file);
    } else if (ext === 'eps') {
      svgText = await convertEpsToSvg(file);
    } else {
      showToast('Unsupported format');
      showLoading(false);
      return;
    }
    if (svgText) loadSvg(svgText, file.name);
  } catch (err) {
    console.error('File processing error:', err);
    showToast('Error: ' + err.message);
  }
  showLoading(false);
}

// ==============================
// PDF/AI to SVG via pdf.js SVGGraphics (2.16.105 has it built in)
// Returns either an SVG string or a DOM element (handled by loadSvg)
// ==============================
async function convertPdfToSvg(file) {
  if (!pdfjsLib) throw new Error('PDF.js not loaded.');
  var arrayBuffer = await file.arrayBuffer();
  var pdf = await pdfjsLib.getDocument({ data: new Uint8Array(arrayBuffer) }).promise;
  var page = await pdf.getPage(1);
  var vp = page.getViewport({ scale: 1 });

  // pdf.js 2.x SVGGraphics -- returns a real SVG DOM element
  if (pdfjsLib.SVGGraphics) {
    try {
      var opList = await page.getOperatorList();
      var svgGfx = new pdfjsLib.SVGGraphics(page.commonObjs, page.objs);
      svgGfx.embedFonts = true;
      var svgEl = await svgGfx.getSVG(opList, vp);

      // svgEl is a live SVG DOM element -- serialize it properly
      // Ensure it has proper SVG namespace
      if (svgEl && svgEl.tagName) {
        console.log('SVGGraphics produced element:', svgEl.tagName, 'children:', svgEl.children.length);

        // If the returned element is an svg:svg element, serialize and return
        var tagLower = svgEl.tagName.toLowerCase();
        if (tagLower === 'svg' || tagLower === 'svg:svg') {
          // Ensure xmlns is set
          svgEl.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
          // Ensure viewBox and dimensions
          if (!svgEl.getAttribute('viewBox')) {
            svgEl.setAttribute('viewBox', '0 0 ' + rd(vp.width) + ' ' + rd(vp.height));
          }
          if (!svgEl.getAttribute('width')) svgEl.setAttribute('width', rd(vp.width));
          if (!svgEl.getAttribute('height')) svgEl.setAttribute('height', rd(vp.height));

          var serializer = new XMLSerializer();
          var svgStr = serializer.serializeToString(svgEl);

          // Fix common serialization issues
          if (svgStr.indexOf('xmlns="http://www.w3.org/2000/svg"') === -1) {
            svgStr = svgStr.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
          }
          // Remove any xml declaration
          svgStr = svgStr.replace(/<\?xml[^?]*\?>/, '');

          console.log('SVG string length:', svgStr.length, 'starts with:', svgStr.substring(0, 100));
          return svgStr;
        }
      }
      console.warn('SVGGraphics returned unexpected element:', svgEl);
    } catch (err) {
      console.warn('SVGGraphics failed, using canvas fallback:', err);
    }
  }

  // Fallback: high-DPI canvas render embedded in SVG
  console.log('Using canvas fallback for PDF/AI');
  var scale = 3;
  var scaledVp = page.getViewport({ scale: scale });
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  canvas.width = scaledVp.width;
  canvas.height = scaledVp.height;
  await page.render({ canvasContext: ctx, viewport: scaledVp }).promise;
  var dataUrl = canvas.toDataURL('image/png');
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + rd(vp.width) + ' ' + rd(vp.height) +
    '" width="' + rd(vp.width) + '" height="' + rd(vp.height) + '">' +
    '<image href="' + dataUrl + '" width="' + rd(vp.width) + '" height="' + rd(vp.height) + '" data-name="Raster"/></svg>';
}

function rd(n) { return Math.round(n * 100) / 100; }
function rgbStr(r, g, b) { return 'rgb(' + Math.round(r*255) + ',' + Math.round(g*255) + ',' + Math.round(b*255) + ')'; }
function cmykToRgb(c, m, y, k) { return 'rgb(' + Math.round(255*(1-c)*(1-k)) + ',' + Math.round(255*(1-m)*(1-k)) + ',' + Math.round(255*(1-y)*(1-k)) + ')'; }

// ==============================
// EPS to SVG
// ==============================
async function convertEpsToSvg(file) {
  var text = await file.text();
  var bbMatch = text.match(/%%BoundingBox:\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/);
  var width = 612, height = 792;
  if (bbMatch) { width = parseFloat(bbMatch[3]) - parseFloat(bbMatch[1]); height = parseFloat(bbMatch[4]) - parseFloat(bbMatch[2]); }

  var svgPaths = [], currentPath = '', fillColor = '#000', strokeColor = '#000', strokeWidth = 1, pathCount = 0, stack = [];
  var lines = text.split('\n');
  for (var li = 0; li < lines.length; li++) {
    var trimmed = lines[li].trim();
    if (trimmed.charAt(0) === '%') continue;
    var tokens = trimmed.split(/\s+/);
    for (var ti = 0; ti < tokens.length; ti++) {
      var token = tokens[ti], num = parseFloat(token);
      if (!isNaN(num) && isFinite(num)) { stack.push(num); continue; }
      var y, x, y3, x3, y2, x2, y1, x1, b, g, rv, k2, m2, cv, w, gv, v;
      switch (token) {
        case 'moveto': case 'm': y = stack.pop(); x = stack.pop(); if (x !== undefined) currentPath += 'M' + rd(x) + ' ' + rd(y); break;
        case 'lineto': case 'l': y = stack.pop(); x = stack.pop(); if (x !== undefined) currentPath += 'L' + rd(x) + ' ' + rd(y); break;
        case 'curveto': case 'c': y3 = stack.pop(); x3 = stack.pop(); y2 = stack.pop(); x2 = stack.pop(); y1 = stack.pop(); x1 = stack.pop(); if (x1 !== undefined) currentPath += 'C' + rd(x1) + ' ' + rd(y1) + ' ' + rd(x2) + ' ' + rd(y2) + ' ' + rd(x3) + ' ' + rd(y3); break;
        case 'closepath': case 'cp': currentPath += 'Z'; break;
        case 'fill': case 'f': if (currentPath) { pathCount++; svgPaths.push('<path d="' + currentPath + '" fill="' + fillColor + '" data-name="Path ' + pathCount + '"/>'); currentPath = ''; } break;
        case 'stroke': case 's': if (currentPath) { pathCount++; svgPaths.push('<path d="' + currentPath + '" fill="none" stroke="' + strokeColor + '" stroke-width="' + strokeWidth + '" data-name="Path ' + pathCount + '"/>'); currentPath = ''; } break;
        case 'setrgbcolor': b = stack.pop(); g = stack.pop(); rv = stack.pop(); if (rv !== undefined) { var cc = rgbStr(rv, g, b); fillColor = cc; strokeColor = cc; } break;
        case 'setcmykcolor': k2 = stack.pop(); y = stack.pop(); m2 = stack.pop(); cv = stack.pop(); if (cv !== undefined) { var cc2 = cmykToRgb(cv, m2, y, k2); fillColor = cc2; strokeColor = cc2; } break;
        case 'setlinewidth': w = stack.pop(); if (w !== undefined) strokeWidth = w; break;
        case 'setgray': gv = stack.pop(); if (gv !== undefined) { v = Math.round(gv * 255); fillColor = 'rgb(' + v + ',' + v + ',' + v + ')'; strokeColor = fillColor; } break;
        case 'newpath': currentPath = ''; stack = []; break;
      }
    }
  }
  if (svgPaths.length === 0) throw new Error('No vector data found in EPS.');
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + rd(width) + ' ' + rd(height) + '" width="' + rd(width) + '" height="' + rd(height) + '"><g transform="translate(0,' + rd(height) + ') scale(1,-1)">' + svgPaths.join('') + '</g></svg>';
}

// ==============================
// Load SVG into canvas
// ==============================
function loadSvg(svgText, fileName) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(svgText, 'image/svg+xml');
  var svgEl = doc.querySelector('svg');

  // Check for parse errors (DOMParser returns parsererror for invalid XML)
  var parseError = doc.querySelector('parsererror');
  if (parseError) {
    console.error('SVG parse error:', parseError.textContent);
    // Try to fix common issues: missing xmlns, invalid XML chars
    var fixed = svgText;
    if (fixed.indexOf('xmlns=') === -1) {
      fixed = fixed.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
    }
    // Remove null bytes and invalid XML characters
    fixed = fixed.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, '');
    doc = parser.parseFromString(fixed, 'image/svg+xml');
    svgEl = doc.querySelector('svg');
  }

  if (!svgEl) {
    // Last resort: try text/html parser which is more lenient
    doc = parser.parseFromString('<div>' + svgText + '</div>', 'text/html');
    svgEl = doc.querySelector('svg');
  }

  if (!svgEl) { showToast('Could not parse file as SVG'); console.error('Failed to parse SVG. First 500 chars:', svgText.substring(0, 500)); return; }
  svgEl.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  currentSvgDoc = svgEl;
  while (viewport.firstChild) viewport.removeChild(viewport.firstChild);
  viewport.appendChild(svgEl.cloneNode(true));
  var displaySvg = viewport.querySelector('svg');
  makeElementsInteractive(displaySvg);
  buildLayerTree(displaySvg);
  dropzone.classList.add('hidden');
  container.style.display = 'block';
  bottombar.style.display = 'flex';
  document.getElementById('btnClearAll').style.display = '';
  document.getElementById('fileInfo').textContent = fileName;
  zoom = 1; panX = 0; panY = 0;
  requestAnimationFrame(function() { fitToView(); });
}

// ==============================
// Make SVG elements interactive
// ==============================
function makeElementsInteractive(svgEl) {
  var interactiveTypes = { path: 1, rect: 1, circle: 1, ellipse: 1, polygon: 1, polyline: 1, line: 1, text: 1, image: 1, use: 1 };
  function processElement(el) {
    var tag = el.tagName && el.tagName.toLowerCase();
    if (interactiveTypes[tag]) {
      el.classList.add('svg-element-interactive');
      el.addEventListener('mouseenter', function(e) { e.stopPropagation(); hoverElement(el); });
      el.addEventListener('mouseleave', function() { unhoverElement(el); });
      el.addEventListener('click', function(e) { e.stopPropagation(); e.preventDefault(); toggleSelectElement(el, e.ctrlKey || e.metaKey || e.shiftKey); });
    }
    if (el.children) { for (var i = 0; i < el.children.length; i++) processElement(el.children[i]); }
  }
  svgEl.addEventListener('click', function(e) { if (e.target === svgEl) deselectAll(); });
  processElement(svgEl);
}

// ==============================
// Hover
// ==============================
function hoverElement(el) {
  if (hoveredElement && hoveredElement !== el) hoveredElement.classList.remove('element-highlight-hover');
  hoveredElement = el;
  el.classList.add('element-highlight-hover');
  var idx = getElementIndex(el);
  layerTree.querySelectorAll('.layer-item.hovered').forEach(function(li) { li.classList.remove('hovered'); });
  var layerItem = layerTree.querySelector('.layer-item[data-index="' + idx + '"]');
  if (layerItem) layerItem.classList.add('hovered');
}

function unhoverElement(el) {
  el.classList.remove('element-highlight-hover');
  if (hoveredElement === el) hoveredElement = null;
  layerTree.querySelectorAll('.layer-item.hovered').forEach(function(li) { li.classList.remove('hovered'); });
}

// ==============================
// Multi-select: click and marquee
// ==============================
function toggleSelectElement(el, additive) {
  if (!additive) {
    // Single select -- clear others
    selectedElements.forEach(function(sel) { sel.classList.remove('element-highlight-selected'); });
    layerTree.querySelectorAll('.layer-item.selected').forEach(function(li) { li.classList.remove('selected'); });
    selectedElements = [];
  }
  var idx = selectedElements.indexOf(el);
  if (idx >= 0) {
    // Deselect this element
    el.classList.remove('element-highlight-selected');
    selectedElements.splice(idx, 1);
    var li = layerTree.querySelector('.layer-item[data-index="' + getElementIndex(el) + '"]');
    if (li) li.classList.remove('selected');
  } else {
    // Select this element
    el.classList.add('element-highlight-selected');
    el.classList.remove('element-highlight-hover');
    selectedElements.push(el);
    var li2 = layerTree.querySelector('.layer-item[data-index="' + getElementIndex(el) + '"]');
    if (li2) { li2.classList.add('selected'); li2.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  }
  updateSelectionPanel();
}

function selectElementsInRect(screenRect) {
  // Get all interactive elements and check if their screen bounding box intersects the marquee
  var allEls = viewport.querySelectorAll('.svg-element-interactive');
  var newSelection = [];
  for (var i = 0; i < allEls.length; i++) {
    var el = allEls[i];
    try {
      var bbox = el.getBoundingClientRect();
      if (rectsIntersect(screenRect, { left: bbox.left, top: bbox.top, right: bbox.right, bottom: bbox.bottom })) {
        newSelection.push(el);
      }
    } catch (e) {}
  }
  // Clear previous selection
  selectedElements.forEach(function(sel) { sel.classList.remove('element-highlight-selected'); });
  layerTree.querySelectorAll('.layer-item.selected').forEach(function(li) { li.classList.remove('selected'); });
  // Apply new
  selectedElements = newSelection;
  selectedElements.forEach(function(el) {
    el.classList.add('element-highlight-selected');
    var li = layerTree.querySelector('.layer-item[data-index="' + getElementIndex(el) + '"]');
    if (li) li.classList.add('selected');
  });
  updateSelectionPanel();
}

function rectsIntersect(a, b) {
  return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
}

function deselectAll() {
  selectedElements.forEach(function(el) { el.classList.remove('element-highlight-selected'); });
  layerTree.querySelectorAll('.layer-item.selected').forEach(function(li) { li.classList.remove('selected'); });
  selectedElements = [];
  selectionPanel.classList.remove('visible');
}

function getElementIndex(el) {
  var allElements = viewport.querySelectorAll('.svg-element-interactive');
  for (var i = 0; i < allElements.length; i++) { if (allElements[i] === el) return i; }
  return -1;
}

// ==============================
// Selection Panel (supports multi-select)
// ==============================
function updateSelectionPanel() {
  if (selectedElements.length === 0) {
    selectionPanel.classList.remove('visible');
    return;
  }
  // Preview
  var previewSvg = generateSelectionSvg(selectedElements);
  while (selectionPreview.firstChild) selectionPreview.removeChild(selectionPreview.firstChild);
  var previewParser = new DOMParser();
  var previewDoc = previewParser.parseFromString(previewSvg, 'image/svg+xml');
  var previewSvgEl = previewDoc.querySelector('svg');
  if (previewSvgEl) selectionPreview.appendChild(document.importNode(previewSvgEl, true));

  // Metadata
  while (selectionMeta.firstChild) selectionMeta.removeChild(selectionMeta.firstChild);
  var metaItems;
  if (selectedElements.length === 1) {
    var el = selectedElements[0];
    var tag = el.tagName.toLowerCase();
    var name = el.getAttribute('data-name') || el.getAttribute('id') || el.getAttribute('class') || tag;
    var bbox;
    try { bbox = el.getBBox(); } catch (e) { bbox = { x: 0, y: 0, width: 0, height: 0 }; }
    metaItems = [
      { label: 'Type', value: tag },
      { label: 'Name', value: name },
      { label: 'Size', value: rd(bbox.width) + ' x ' + rd(bbox.height) },
      { label: 'Position', value: rd(bbox.x) + ', ' + rd(bbox.y) }
    ];
  } else {
    metaItems = [
      { label: 'Selected', value: selectedElements.length + ' elements' },
      { label: 'Types', value: getUniqueTypes(selectedElements) }
    ];
  }
  for (var i = 0; i < metaItems.length; i++) {
    var div = document.createElement('div');
    div.className = 'selection-meta-item';
    var labelSpan = document.createElement('span');
    labelSpan.className = 'selection-meta-label';
    labelSpan.textContent = metaItems[i].label;
    var valueSpan = document.createElement('span');
    valueSpan.className = 'selection-meta-value';
    valueSpan.textContent = metaItems[i].value;
    div.appendChild(labelSpan);
    div.appendChild(valueSpan);
    selectionMeta.appendChild(div);
  }
  document.querySelector('.selection-panel-title').textContent = selectedElements.length === 1 ? 'Selected element' : selectedElements.length + ' elements selected';
  selectionPanel.classList.add('visible');
}

function getUniqueTypes(els) {
  var types = {};
  for (var i = 0; i < els.length; i++) types[els[i].tagName.toLowerCase()] = true;
  return Object.keys(types).join(', ');
}

// ==============================
// Generate SVG from selected elements (single or multi)
// ==============================
function generateSelectionSvg(elements) {
  if (elements.length === 0) return '<svg xmlns="http://www.w3.org/2000/svg"></svg>';

  var svgRoot = viewport.querySelector('svg');
  var serializer = new XMLSerializer();

  // Strategy: clone the entire SVG, then remove everything that is NOT
  // a selected element or an ancestor/dependency of one.
  // This preserves clip-paths, masks, gradients, transforms, and group hierarchy.
  var svgClone = svgRoot.cloneNode(true);

  // Build a set of "keeper" original elements
  var keepSet = new Set();
  for (var i = 0; i < elements.length; i++) keepSet.add(elements[i]);

  // Map from original elements to their cloned counterparts by tree position.
  // We walk both trees in sync to build the mapping.
  var allOriginal = svgRoot.querySelectorAll('.svg-element-interactive');
  var allCloned = svgClone.querySelectorAll('.svg-element-interactive');

  // Mark cloned elements: remove those not selected
  var keepCloned = new Set();
  for (var j = 0; j < allOriginal.length; j++) {
    if (keepSet.has(allOriginal[j])) {
      keepCloned.add(allCloned[j]);
    }
  }

  // Remove non-selected interactive elements from the clone
  for (var k = allCloned.length - 1; k >= 0; k--) {
    if (!keepCloned.has(allCloned[k])) {
      allCloned[k].remove();
    }
  }

  // Clean up empty groups (groups that no longer have any visible children)
  var changed = true;
  while (changed) {
    changed = false;
    var groups = svgClone.querySelectorAll('g');
    for (var g = groups.length - 1; g >= 0; g--) {
      var grp = groups[g];
      // Keep group if it has child elements (excluding empty text nodes)
      if (grp.children.length === 0) {
        grp.remove();
        changed = true;
      }
    }
  }

  // Clean interactive classes from remaining elements
  var remaining = svgClone.querySelectorAll('.svg-element-interactive, .element-highlight-selected, .element-highlight-hover');
  for (var r = 0; r < remaining.length; r++) {
    remaining[r].classList.remove('svg-element-interactive', 'element-highlight-selected', 'element-highlight-hover');
    if (remaining[r].getAttribute('class') === '') remaining[r].removeAttribute('class');
  }

  // Compute tight viewBox from remaining visible elements
  // Temporarily insert into document to get bounding boxes
  var tempContainer = document.createElement('div');
  tempContainer.style.cssText = 'position:fixed;left:-9999px;top:-9999px;visibility:hidden;';
  document.body.appendChild(tempContainer);
  tempContainer.appendChild(svgClone);

  var visibleEls = svgClone.querySelectorAll('path, rect, circle, ellipse, polygon, polyline, line, text, image, use');
  var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (var v = 0; v < visibleEls.length; v++) {
    try {
      var bbox = visibleEls[v].getBBox();
      if (bbox.width === 0 && bbox.height === 0) continue;
      // Walk up parent transforms
      var el = visibleEls[v];
      var ctm = el.getCTM();
      var svgCtm2 = svgClone.getCTM();
      if (ctm && svgCtm2) {
        var inv = svgCtm2.inverse();
        var m = inv.multiply(ctm);
        // Transform all 4 corners
        var corners = [
          { x: bbox.x, y: bbox.y },
          { x: bbox.x + bbox.width, y: bbox.y },
          { x: bbox.x, y: bbox.y + bbox.height },
          { x: bbox.x + bbox.width, y: bbox.y + bbox.height }
        ];
        for (var c = 0; c < corners.length; c++) {
          var tx = m.a * corners[c].x + m.c * corners[c].y + m.e;
          var ty = m.b * corners[c].x + m.d * corners[c].y + m.f;
          if (tx < minX) minX = tx;
          if (ty < minY) minY = ty;
          if (tx > maxX) maxX = tx;
          if (ty > maxY) maxY = ty;
        }
      } else {
        if (bbox.x < minX) minX = bbox.x;
        if (bbox.y < minY) minY = bbox.y;
        if (bbox.x + bbox.width > maxX) maxX = bbox.x + bbox.width;
        if (bbox.y + bbox.height > maxY) maxY = bbox.y + bbox.height;
      }
    } catch (e) {}
  }

  document.body.removeChild(tempContainer);

  // Set tight viewBox with small padding
  var pad = Math.max(maxX - minX, maxY - minY) * 0.03;
  if (!isFinite(pad) || pad < 1) pad = 2;
  if (isFinite(minX)) {
    svgClone.setAttribute('viewBox', rd(minX - pad) + ' ' + rd(minY - pad) + ' ' + rd(maxX - minX + pad * 2) + ' ' + rd(maxY - minY + pad * 2));
  }
  svgClone.removeAttribute('width');
  svgClone.removeAttribute('height');
  svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

  var result = serializer.serializeToString(svgClone);
  result = result.replace(/<\?xml[^?]*\?>/, '');
  return result;
}

// ==============================
// SVG Optimization
// ==============================
function optimizeSvg(svgString) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(svgString, 'image/svg+xml');
  var svg = doc.querySelector('svg');
  if (!svg) return svgString;

  svg.querySelectorAll('metadata, title, desc').forEach(function(el) { el.remove(); });
  // Remove comments
  var walker = document.createTreeWalker(svg, NodeFilter.SHOW_COMMENT, null);
  var comments = [];
  while (walker.nextNode()) comments.push(walker.currentNode);
  comments.forEach(function(c) { c.remove(); });

  var removeAttrs = ['data-name', 'data-layer', 'xmlns:xlink', 'xmlns:sodipodi', 'xmlns:inkscape', 'xml:space'];
  walkDom(svg, function(el) {
    var attrsToRemove = [];
    for (var i = 0; i < el.attributes.length; i++) {
      var aname = el.attributes[i].name;
      if (removeAttrs.indexOf(aname) >= 0 || aname.indexOf('sodipodi:') === 0 || aname.indexOf('inkscape:') === 0 || aname.indexOf('data-') === 0) attrsToRemove.push(aname);
    }
    attrsToRemove.forEach(function(a) { el.removeAttribute(a); });
    if (el.classList) {
      el.classList.remove('svg-element-interactive', 'element-highlight-hover', 'element-highlight-selected');
      if (el.getAttribute('class') === '') el.removeAttribute('class');
    }
    if (el.tagName === 'path' && el.getAttribute('d')) el.setAttribute('d', simplifyPathData(el.getAttribute('d')));
    var numericAttrs = ['x', 'y', 'x1', 'y1', 'x2', 'y2', 'cx', 'cy', 'r', 'rx', 'ry', 'width', 'height', 'stroke-width', 'opacity', 'font-size'];
    for (var j = 0; j < numericAttrs.length; j++) {
      var val = el.getAttribute(numericAttrs[j]);
      if (val && !isNaN(parseFloat(val))) el.setAttribute(numericAttrs[j], rd(parseFloat(val)).toString());
    }
    if (el.getAttribute('fill-opacity') === '1') el.removeAttribute('fill-opacity');
    if (el.getAttribute('stroke-opacity') === '1') el.removeAttribute('stroke-opacity');
    if (el.getAttribute('opacity') === '1') el.removeAttribute('opacity');
    if (el.getAttribute('fill-rule') === 'nonzero') el.removeAttribute('fill-rule');
  });

  // Clean trivial transforms
  walkDom(svg, function(el) {
    var transform = el.getAttribute('transform');
    if (!transform) return;
    var t = transform.trim();
    if (/^translate\(0[, ]0\)$/.test(t) || t === 'translate(0)' || /^scale\(1[, ]1\)$/.test(t) || t === 'scale(1)') el.removeAttribute('transform');
  });

  // Remove empty groups
  var changed = true;
  while (changed) {
    changed = false;
    svg.querySelectorAll('g').forEach(function(g) {
      if (g.children.length === 0 && g.textContent.trim() === '') { g.remove(); changed = true; }
      else if (g.children.length === 1 && !g.getAttribute('transform') && !g.getAttribute('clip-path') && !g.getAttribute('mask') && !g.getAttribute('filter') && !g.getAttribute('opacity')) { g.replaceWith(g.children[0]); changed = true; }
    });
  }

  var result = new XMLSerializer().serializeToString(svg);
  result = result.replace(/<\?xml[^?]*\?>/, '');
  var first = true;
  result = result.replace(/ xmlns="http:\/\/www\.w3\.org\/2000\/svg"/g, function(match) { if (first) { first = false; return match; } return ''; });
  result = result.replace(/>\s+</g, '><');
  return formatSvg(result);
}

function walkDom(el, callback) {
  if (el.nodeType === 1) { callback(el); for (var i = 0; i < el.children.length; i++) walkDom(el.children[i], callback); }
}

function simplifyPathData(d) {
  return d.replace(/-?\d+\.?\d*/g, function(match) { var num = parseFloat(match); if (isNaN(num)) return match; return (Math.round(num * 100) / 100).toString(); }).replace(/\s+/g, ' ').replace(/ ([MCLZSQTAHVmclzsqtahv])/g, '$1').replace(/([MCLZSQTAHVmclzsqtahv]) /g, '$1').trim();
}

function formatSvg(svg) {
  var formatted = '', indent = 0;
  var tags = svg.replace(/></g, '>\n<').split('\n');
  for (var i = 0; i < tags.length; i++) {
    var trimmed = tags[i].trim();
    if (!trimmed) continue;
    if (trimmed.indexOf('</') === 0) indent--;
    formatted += '  '.repeat(Math.max(0, indent)) + trimmed + '\n';
    if (trimmed.charAt(0) === '<' && trimmed.indexOf('</') !== 0 && trimmed.indexOf('/>') === -1 && trimmed.indexOf('</') === -1) indent++;
  }
  return formatted.trim();
}

// ==============================
// Copy / Show code (multi-select aware)
// ==============================
async function copySelectedSVG() {
  if (!selectedElements.length) return;
  var optimized = optimizeSvg(generateSelectionSvg(selectedElements));
  try { await navigator.clipboard.writeText(optimized); } catch (err) { fallbackCopy(optimized); }
  showToast('SVG copied (' + selectedElements.length + ' element' + (selectedElements.length > 1 ? 's' : '') + ')');
}

function showSVGCode() {
  if (!selectedElements.length) return;
  var optimized = optimizeSvg(generateSelectionSvg(selectedElements));
  codeContent.textContent = optimized;
  codeModal.classList.add('visible');
}

async function copyFromModal() {
  var code = codeContent.textContent;
  try { await navigator.clipboard.writeText(code); } catch (err) { fallbackCopy(code); }
  showToast('SVG copied to clipboard');
}

function closeModal() { codeModal.classList.remove('visible'); }

function fallbackCopy(text) {
  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);
}

// ==============================
// Layer tree building
// ==============================
function buildLayerTree(svgEl) {
  var elementIndex = 0;
  while (layerTree.firstChild) layerTree.removeChild(layerTree.firstChild);

  function processNode(node, depth) {
    var tag = node.tagName && node.tagName.toLowerCase();
    if (!tag) return;
    if (['defs', 'metadata', 'title', 'desc', 'style'].indexOf(tag) >= 0) return;
    var isGroup = tag === 'g';
    var isElement = ['path', 'rect', 'circle', 'ellipse', 'polygon', 'polyline', 'line', 'text', 'image', 'use'].indexOf(tag) >= 0;
    if (!isGroup && !isElement) {
      if (node.children) { for (var i = 0; i < node.children.length; i++) processNode(node.children[i], depth); }
      return;
    }
    var name = node.getAttribute('data-name') || node.getAttribute('id') || (isGroup ? 'Group' : tag);

    if (isGroup) {
      var childCount = node.querySelectorAll('path, rect, circle, ellipse, polygon, polyline, line, text, image, use').length;
      var item = document.createElement('div');
      item.className = 'layer-item layer-item--group';
      item.dataset.index = '-1';
      item.dataset.depth = depth;

      var toggleSpan = document.createElement('span');
      toggleSpan.className = 'layer-toggle expanded';
      var toggleSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      toggleSvg.setAttribute('viewBox', '0 0 10 10');
      toggleSvg.setAttribute('fill', 'currentColor');
      var polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', '3,1 9,5 3,9');
      toggleSvg.appendChild(polygon);
      toggleSpan.appendChild(toggleSvg);

      var nameSpan = document.createElement('span');
      nameSpan.className = 'layer-name';
      nameSpan.textContent = name;
      var typeSpan = document.createElement('span');
      typeSpan.className = 'layer-type';
      typeSpan.textContent = childCount;

      item.appendChild(toggleSpan);
      item.appendChild(nameSpan);
      item.appendChild(typeSpan);
      item.addEventListener('click', function() { toggleGroup(this); }.bind(item));
      layerTree.appendChild(item);
      for (var c = 0; c < node.children.length; c++) processNode(node.children[c], depth + 1);
    } else if (isElement) {
      var idx = elementIndex++;
      var elItem = document.createElement('div');
      elItem.className = 'layer-item' + (depth > 0 ? ' layer-item--child' : '');
      elItem.dataset.index = idx;
      elItem.style.paddingLeft = (16 + depth * 16) + 'px';
      var elName = document.createElement('span');
      elName.className = 'layer-name';
      elName.textContent = name;
      var elType = document.createElement('span');
      elType.className = 'layer-type';
      elType.textContent = tag;
      elItem.appendChild(elName);
      elItem.appendChild(elType);

      (function(capturedIdx) {
        elItem.addEventListener('mouseenter', function() {
          var els = viewport.querySelectorAll('.svg-element-interactive');
          if (els[capturedIdx]) hoverElement(els[capturedIdx]);
        });
        elItem.addEventListener('mouseleave', function() {
          var els = viewport.querySelectorAll('.svg-element-interactive');
          if (els[capturedIdx]) unhoverElement(els[capturedIdx]);
        });
        elItem.addEventListener('click', function(e) {
          var els = viewport.querySelectorAll('.svg-element-interactive');
          if (els[capturedIdx]) toggleSelectElement(els[capturedIdx], e.ctrlKey || e.metaKey || e.shiftKey);
        });
      })(idx);

      layerTree.appendChild(elItem);
    }
  }
  for (var i = 0; i < svgEl.children.length; i++) processNode(svgEl.children[i], 0);
  layerCountEl.textContent = elementIndex;
}

function toggleGroup(groupEl) {
  var toggle = groupEl.querySelector('.layer-toggle');
  var isExpanded = toggle.classList.contains('expanded');
  toggle.classList.toggle('expanded');
  var sibling = groupEl.nextElementSibling;
  var groupDepth = parseInt(groupEl.dataset.depth);
  while (sibling) {
    var sibDepth = parseInt(sibling.dataset.depth || '0');
    var isChildGroup = sibling.classList.contains('layer-item--group');
    if (isChildGroup && sibDepth <= groupDepth) break;
    if (!isChildGroup && parseInt(sibling.style.paddingLeft) <= (16 + groupDepth * 16)) break;
    sibling.style.display = isExpanded ? 'none' : '';
    sibling = sibling.nextElementSibling;
  }
}

// ==============================
// Pan & Zoom & Marquee Selection
// ==============================
mainArea.addEventListener('wheel', function(e) {
  if (!currentSvgDoc) return;
  e.preventDefault();
  var delta = e.deltaY > 0 ? 0.9 : 1.1;
  var newZoom = Math.max(0.05, Math.min(20, zoom * delta));
  var rect = container.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
  updateViewport();
}, { passive: false });

mainArea.addEventListener('mousedown', function(e) {
  if (!currentSvgDoc) return;
  if (e.button === 1) {
    // Middle-click: always pan
    isPanning = true;
    panStartX = e.clientX - panX;
    panStartY = e.clientY - panY;
    viewport.style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }
  if (e.button === 0) {
    var target = e.target;
    var isOnSvgElement = target.classList && target.classList.contains('svg-element-interactive');
    var isOnCanvas = target === container || target === mainArea || target.classList.contains('canvas-grid');
    var isOnViewportSvg = viewport.contains(target) && !isOnSvgElement;

    if (isOnCanvas || isOnViewportSvg) {
      // Start marquee selection
      isMarquee = true;
      marqueeStartX = e.clientX;
      marqueeStartY = e.clientY;
      marqueeEl.style.left = e.clientX + 'px';
      marqueeEl.style.top = e.clientY + 'px';
      marqueeEl.style.width = '0';
      marqueeEl.style.height = '0';
      e.preventDefault();
    }
  }
});

window.addEventListener('mousemove', function(e) {
  if (isPanning) {
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    updateViewport();
  }
  if (isMarquee) {
    var x = Math.min(marqueeStartX, e.clientX);
    var y = Math.min(marqueeStartY, e.clientY);
    var w = Math.abs(e.clientX - marqueeStartX);
    var h = Math.abs(e.clientY - marqueeStartY);
    marqueeEl.style.left = x + 'px';
    marqueeEl.style.top = y + 'px';
    marqueeEl.style.width = w + 'px';
    marqueeEl.style.height = h + 'px';
    if (w > 3 || h > 3) {
      marqueeEl.classList.add('active');
    }
  }
});

window.addEventListener('mouseup', function(e) {
  if (isPanning) {
    isPanning = false;
    viewport.style.cursor = '';
  }
  if (isMarquee) {
    isMarquee = false;
    var wasVisible = marqueeEl.classList.contains('active');
    marqueeEl.classList.remove('active');

    if (wasVisible) {
      // Compute marquee rect in screen coords
      var x = Math.min(marqueeStartX, e.clientX);
      var y = Math.min(marqueeStartY, e.clientY);
      var w = Math.abs(e.clientX - marqueeStartX);
      var h = Math.abs(e.clientY - marqueeStartY);

      if (w > 5 && h > 5) {
        selectElementsInRect({ left: x, top: y, right: x + w, bottom: y + h });
      }
    } else {
      // Tiny drag = just a click on empty area, deselect
      deselectAll();
    }
  }
});

function updateViewport() {
  viewport.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + zoom + ')';
  document.getElementById('zoomDisplay').textContent = Math.round(zoom * 100) + '%';
}

function zoomIn() { zoom = Math.min(20, zoom * 1.25); updateViewport(); }
function zoomOut() { zoom = Math.max(0.05, zoom * 0.8); updateViewport(); }

function fitToView() {
  var svgEl = viewport.querySelector('svg');
  if (!svgEl) return;
  var cRect = container.getBoundingClientRect();
  var svgW = (svgEl.viewBox && svgEl.viewBox.baseVal && svgEl.viewBox.baseVal.width) || (svgEl.width && svgEl.width.baseVal && svgEl.width.baseVal.value) || parseFloat(svgEl.getAttribute('width')) || 800;
  var svgH = (svgEl.viewBox && svgEl.viewBox.baseVal && svgEl.viewBox.baseVal.height) || (svgEl.height && svgEl.height.baseVal && svgEl.height.baseVal.value) || parseFloat(svgEl.getAttribute('height')) || 600;
  var padding = 60;
  var scaleX = (cRect.width - padding * 2) / svgW;
  var scaleY = (cRect.height - padding * 2) / svgH;
  zoom = Math.min(scaleX, scaleY, 3);
  panX = (cRect.width - svgW * zoom) / 2;
  panY = (cRect.height - svgH * zoom) / 2;
  updateViewport();
}

// ==============================
// Clear all
// ==============================
function clearAll() {
  currentSvgDoc = null;
  selectedElements = [];
  hoveredElement = null;
  while (viewport.firstChild) viewport.removeChild(viewport.firstChild);
  while (layerTree.firstChild) layerTree.removeChild(layerTree.firstChild);
  var placeholder = document.createElement('div');
  placeholder.style.cssText = 'padding: 20px 16px; text-align: center;';
  var p = document.createElement('p');
  p.style.cssText = 'color: var(--text-muted); font-size: 11px; line-height: 1.6;';
  p.textContent = 'Load a vector file to see layers here';
  placeholder.appendChild(p);
  layerTree.appendChild(placeholder);
  layerCountEl.textContent = '0';
  dropzone.classList.remove('hidden');
  container.style.display = 'none';
  bottombar.style.display = 'none';
  selectionPanel.classList.remove('visible');
  document.getElementById('btnClearAll').style.display = 'none';
  fileInput.value = '';
}

// ==============================
// Utilities
// ==============================
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(function() { toastEl.classList.remove('show'); }, 2500);
}

function showLoading(show) { loadingOverlay.classList.toggle('visible', show); }
</script>
